# Manually bump the app version before cutting a release.
# Run this BEFORE merging to production. It commits the version change to dev.
# Build number is managed automatically by EAS (appVersionSource: "remote").

name: Bump version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    name: Bump ${{ github.event.inputs.bump }} version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bump version in app.json
        id: bump
        run: |
          CURRENT=$(node -p "require('./app.json').expo.version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ github.event.inputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW="$MAJOR.$MINOR.$PATCH"
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            cfg.expo.version = '$NEW';
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2) + '\n');
          "
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT → $NEW"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push origin dev

      - name: Summary
        run: |
          echo "## Version bumped to ${{ steps.bump.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Committed to \`dev\`. Flow through dev → preview → main → production as normal." >> "$GITHUB_STEP_SUMMARY"
          echo "EAS will auto-increment the build number on the production push." >> "$GITHUB_STEP_SUMMARY"
