# Run before PR-ing dev → preview.
# Bumps the app version (patch/minor/major) AND the build number in app.json.
# EAS reads both values from app.json (appVersionSource: local, autoIncrement: false).

name: Bump version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    name: Bump ${{ github.event.inputs.bump }} version + build number
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bump version and build number in app.json
        id: bump
        run: |
          CURRENT_VERSION=$(node -p "require('./app.json').expo.version")
          CURRENT_BUILD=$(node -p "require('./app.json').expo.ios.buildNumber")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          case "${{ github.event.inputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_BUILD=$((CURRENT_BUILD + 1))
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            cfg.expo.version = '$NEW_VERSION';
            cfg.expo.ios.buildNumber = '$NEW_BUILD';
            cfg.expo.android.versionCode = $NEW_BUILD;
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2) + '\n');
          "
          echo "version=$NEW_VERSION" >> "\$GITHUB_OUTPUT"
          echo "build=$NEW_BUILD" >> "\$GITHUB_OUTPUT"
          echo "Bumped version $CURRENT_VERSION → $NEW_VERSION, build $CURRENT_BUILD → $NEW_BUILD"

      - name: Commit bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json
          git commit -m "chore: bump to ${{ steps.bump.outputs.version }} (build ${{ steps.bump.outputs.build }})"
          git push origin dev

      - name: Summary
        run: |
          {
            echo "## Released: ${{ steps.bump.outputs.version }} (build ${{ steps.bump.outputs.build }})"
            echo ""
            echo "Committed to \`dev\`. Now PR: **dev → preview → main → production**."
            echo "EAS reads build number directly from app.json — no counter drift possible."
          } >> "$GITHUB_STEP_SUMMARY"
