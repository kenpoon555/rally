# Manual EAS preview builds only (saves Free-plan / Starter credits).
# Push to `preview` no longer auto-builds — run from Actions when you need a tester build.
# Requires: EXPO_TOKEN, EAS env, Android keystore, iOS preview credentials (eas credentials -p ios).
# See docs/github-actions-preview.md

name: Deploy preview (EAS)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios

concurrency:
  group: eas-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Tests (fast gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests and lint
        run: npm run verify

  build-android:
    name: EAS preview · Android
    needs: verify
    if: >-
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'android'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci
      - run: eas build --profile preview --platform android --non-interactive --no-wait
      - name: Install link
        run: echo "Android → https://expo.dev/accounts/kendrewpoon/projects/rallyapp/builds"

  build-ios:
    name: EAS preview · iOS
    needs: verify
    if: >-
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'ios'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci
      - run: eas build --profile preview --platform ios --non-interactive --no-wait
      - name: Install link
        run: echo "iOS → https://expo.dev/accounts/kendrewpoon/projects/rallyapp/builds"

  summary:
    name: Where to test
    needs: [build-android, build-ios]
    if: always() && (needs.build-android.result != 'skipped' || needs.build-ios.result != 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Job summary
        run: |
          {
            echo "## Preview install"
            echo ""
            echo "| Platform | CI | Install |"
            echo "|----------|-----|---------|"
            echo "| Android | ${{ needs.build-android.result }} | [Expo builds](https://expo.dev/accounts/kendrewpoon/projects/rallyapp/builds) |"
            echo "| iOS | ${{ needs.build-ios.result }} | Same dashboard (device must be registered for internal) |"
            echo ""
            echo "**Commit:** \`${{ github.sha }}\`"
            echo ""
            echo "Wait until each build shows **Finished**, then open it and install on your phone."
          } >> "$GITHUB_STEP_SUMMARY"
